[build]
  publish = "public"
  command = "hugo --gc --minify"

[context.production.environment]
# Ensure the Hugo version is compatible with Apéro
  HUGO_VERSION = "0.121.0"

[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.images]
  compress = true